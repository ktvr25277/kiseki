  const t=(p.price-minP)/(maxP-minP),color=getColor(t);

  m.on('click',()=>{document.getElementById('info-panel').innerHTML=`<h3>${CITY[p.city_code]||p.city_code}</h3><div class="info-row"><span class="lbl">所在</span><span class="val" style="font-size:10px;">${p.addr.replace('神奈川県','')}</span></div><div class="info-row"><span class="lbl">地価</span><span class="val hi">${fmt(p.price)}円/㎡</span></div><div class="info-row"><span class="lbl">坪単価</span><span class="val">${fmt(Math.round(p.price*3.305))}円</span></div><div style="margin-top:8px;padding-top:8px;border-top:1px solid #1e2030;font-size:10px;color:#5a5d70;">2026年 地価公示</div>`;});
  m.on('mouseover',function(){this.bindTooltip(`<div class="t">${p.addr.replace('神奈川県','')}</div><div class="p">${fmt(p.price)}円/㎡</div><div class="c">${CITY[p.city_code]||''}</div>`,{sticky:true,className:'pt-tip'}).openTooltip();});
  dotL.addLayer(m);
});
function setMode(m,btn){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(m==='heat'){if(!map.hasLayer(heatL))map.addLayer(heatL);if(map.hasLayer(dotL))map.removeLayer(dotL);}else{if(map.hasLayer(heatL))map.removeLayer(heatL);if(!map.hasLayer(dotL))map.addLayer(dotL);}}
</script>
</body>
</html>
