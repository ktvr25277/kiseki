    <div class="post-body"><p>あー、土地探しも工務店探しもネット、ネット、ネットです。</p>
<p>ネットは情報がピンからキリまであって玉石混交。取捨選択しなければならないので疲労困憊です。ブログも細かく書いてあるものは読んでいて疲れますし。</p>
<p>……という愚痴を書きつつ、面白い記事を発見しました。</p>
<p>肩がコリゴリです。</p></div>
